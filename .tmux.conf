
##### 🔌 PLUGIN MANAGER #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

run '~/.tmux/plugins/tpm/tpm'

##### 🎮 PREFIX #####

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g @prefix_highlight_fg '#232a2e'
set -g @prefix_highlight_bg '#b2caed'
set -g @prefix_highlight_prefix '  '
# Mac keymaps
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-\" split-window -v
bind -n M-% split-window -h
bind -n M-w kill-pane
bind -n M-t new-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

##### 📐 SPLIT & NAVIGASI #####
unbind '"'
unbind %

bind | split-window -h
bind - split-window -v

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -n M-j previous-window
bind -n M-k next-window
bind -n M-h switch-client -p
bind -n M-l switch-client -n

##### 🖱️ UX #####
set -g mouse on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 100000

##### ⚡ SHORTCUT #####
bind f run-shell "tmux new ~/.local/scripts/tmux-sessionizer"
bind r source-file ~/.tmux.conf \; display "🔁 Config Reloaded"

##### 📋 COPY MODE (VI) #####
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

##### 🎨 EVERGARDEN FALL (TRANSPARENT) #####

##### 🧱 STATUS BAR #####
set -g status on
set -g status-interval 2
set -g status-position top
set -g status-style bg=default,fg=#f8f9e8,bold
set -g status-left-length 200
set -g status-right-length 200

##### ➤ POWERLINE ARROWS #####
set -g @tmux_arrow_right ""
set -g @tmux_arrow_left  ""

##### 📁 STATUS LEFT #####
set -g status-left '#[fg=#f8f9e8,bg=default,bold]   #(basename "#{pane_current_path}") #[fg=#232a2e,bg=#4a585c]#{@tmux_arrow_right}#[fg=#f8f9e8,bg=#4a585c,bold] #W #[fg=#4a585c,bg=default]#{@tmux_arrow_right}'

##### 🪟 WINDOW LIST #####
setw -g window-status-current-format '#[fg=#232a2e,bg=#cbe3b3]#{@tmux_arrow_right}#[fg=#232a2e,bg=#cbe3b3,bold] #W #[fg=#cbe3b3,bg=default]#{@tmux_arrow_right}'

setw -g window-status-format '#[fg=#96b4aa,bg=default] #W '

setw -g window-status-separator ""
setw -g window-status-activity-style 'fg=#f5d098,bold'
setw -g window-status-bell-style 'fg=#f57f82,bold'

##### 🧩 PANE BORDER #####
set -g pane-border-style fg=#374145
set -g pane-active-border-style fg=#b3e3ca

setw -g window-style bg=default
setw -g window-active-style bg=default

##### 🎵 STATUS RIGHT #####
set -g status-right '#[fg=#96b4aa,bg=default]#{@tmux_arrow_left}#[fg=#f8f9e8,bg=#2b3337,bold] #(cd "#{pane_current_path}" 2>/dev/null && (git rev-parse --is-inside-work-tree 2>/dev/null | grep -q true && git symbolic-ref --short HEAD 2>/dev/null | awk "{print \" \" \$0}" ) || echo "no-git") #[fg=#cbe3b3,bg=#2b3337]#{@tmux_arrow_left}#[fg=#232a2e,bg=#cbe3b3,bold] %H:%M #[fg=#232a2e,bg=#cbe3b3]#{@tmux_arrow_left}'

##### 💬 MESSAGE BOX #####
set -g message-style bg=default,fg=#f8f9e8,bold
set -g message-command-style bg=default,fg=#f8f9e8,bold
